<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pulse — Workout Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#161616;--card:#1e1e1e;--border:#2a2a2a;
  --text:#f0efeb;--muted:#888;--faint:#333;
  --lime:#c8f04a;--lime-dark:#9dbf2e;
  --red:#e84545;--amber:#f0a030;
  --sans:'Inter',system-ui,sans-serif;
  --display:'Bebas Neue',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* LAYOUT */
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px}
.logo{font-family:var(--display);font-size:1.8rem;letter-spacing:0.06em;color:var(--lime)}
.header-right{display:flex;align-items:center;gap:1rem}
.header-tag{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}

main{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 58px);overflow:hidden}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.5rem .75rem .5rem 2.2rem;font-size:13px;font-family:var(--sans);outline:none;transition:border-color .2s}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{border-color:#444}
.search-icon{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);width:14px;height:14px;opacity:.4}

.filter-row{display:flex;gap:.4rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-btn{font-size:11px;letter-spacing:0.04em;padding:.3rem .7rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:var(--sans)}
.filter-btn:hover{border-color:#555;color:var(--text)}
.filter-btn.active{background:var(--lime);border-color:var(--lime);color:#111;font-weight:600}

.exercise-list{flex:1;overflow-y:auto;padding:.75rem}
.exercise-list::-webkit-scrollbar{width:4px}
.exercise-list::-webkit-scrollbar-track{background:transparent}
.exercise-list::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}

.exercise-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.85rem 1rem;margin-bottom:.5rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;gap:.75rem}
.exercise-card:hover{border-color:#444;transform:translateX(2px)}
.ex-info{}
.ex-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:.2rem}
.ex-meta{font-size:11px;color:var(--muted);display:flex;gap:.5rem;align-items:center}
.ex-cat{padding:.15rem .5rem;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.cat-pill{padding:.15rem .5rem;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.add-btn{width:26px;height:26px;border-radius:50%;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-family:var(--sans)}
.add-btn:hover{background:var(--lime);border-color:var(--lime);color:#111}

/* MAIN PANEL */
.main-panel{display:flex;flex-direction:column;overflow:hidden}

/* WORKOUT BUILDER */
.builder-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.builder-top{padding:1.5rem 2rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:1rem}
.workout-name-wrap{flex:1}
.workout-name-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.workout-name{font-family:var(--display);font-size:2.2rem;letter-spacing:.04em;color:var(--text);background:transparent;border:none;outline:none;width:100%;font-size:2rem}
.workout-name::placeholder{color:var(--faint)}
.stats-row{display:flex;gap:1.5rem}
.stat{text-align:right}
.stat-val{font-family:var(--display);font-size:1.6rem;color:var(--lime);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}

.routine-list{flex:1;overflow-y:auto;padding:1.25rem 2rem}
.routine-list::-webkit-scrollbar{width:4px}
.routine-list::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1rem;color:var(--muted);text-align:center}
.empty-icon{width:56px;height:56px;border:2px dashed var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center}

.routine-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:.65rem;display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.ri-left{}
.ri-name{font-size:14px;font-weight:600;margin-bottom:.5rem}
.ri-controls{display:flex;gap:.75rem;align-items:center}
.counter{display:flex;align-items:center;gap:.4rem}
.counter-lbl{font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;min-width:24px}
.counter-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--sans)}
.counter-btn:hover{background:var(--faint);border-color:#555}
.counter-val{font-size:14px;font-weight:600;min-width:22px;text-align:center}
.ri-right{display:flex;flex-direction:column;align-items:flex-end;gap:.5rem}
.kcal-badge{font-size:11px;color:var(--amber);background:#1e1500;border:1px solid #3a2800;padding:.2rem .6rem;border-radius:4px}
.remove-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--sans)}
.remove-btn:hover{background:#2a1010;border-color:var(--red);color:var(--red)}

.builder-bottom{padding:1rem 2rem;border-top:1px solid var(--border);display:flex;gap:.75rem;align-items:center}
.start-btn{background:var(--lime);color:#111;border:none;padding:.75rem 2rem;border-radius:8px;font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:var(--sans)}
.start-btn:hover{background:var(--lime-dark);transform:translateY(-1px)}
.start-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.clear-btn{background:transparent;color:var(--muted);border:1px solid var(--border);padding:.75rem 1.25rem;border-radius:8px;font-size:13px;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.clear-btn:hover{border-color:#555;color:var(--text)}

/* TIMER VIEW */
.timer-view{display:none;flex-direction:column;height:100%;overflow:hidden}
.timer-view.active{display:flex}
.builder-view.hidden{display:none}

.timer-header{padding:1.25rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.5rem 1rem;border-radius:6px;font-size:13px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.back-btn:hover{border-color:#555;color:var(--text)}
.timer-workout-name{font-family:var(--display);font-size:1.3rem;letter-spacing:.06em;color:var(--text)}
.progress-text{font-size:12px;color:var(--muted)}

.timer-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;padding:2rem}
.current-exercise{text-align:center}
.ex-phase{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--lime);margin-bottom:.5rem}
.ex-current-name{font-family:var(--display);font-size:3rem;letter-spacing:.04em;line-height:1.1;margin-bottom:.25rem}
.ex-set-info{font-size:13px;color:var(--muted)}

.timer-ring-wrap{position:relative;width:200px;height:200px}
.timer-ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--faint);stroke-width:8}
.ring-progress{fill:none;stroke:var(--lime);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .9s linear;stroke-dasharray:565;stroke-dashoffset:0}
.ring-progress.rest{stroke:var(--amber)}
.timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-seconds{font-family:var(--display);font-size:4rem;letter-spacing:.02em;line-height:1}
.timer-phase-lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

.timer-controls{display:flex;gap:1rem;align-items:center}
.t-btn{padding:.7rem 1.5rem;border-radius:8px;font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;font-family:var(--sans);border:1px solid var(--border);background:var(--card);color:var(--text)}
.t-btn:hover{background:var(--faint)}
.t-btn.primary{background:var(--lime);border-color:var(--lime);color:#111}
.t-btn.primary:hover{background:var(--lime-dark)}

.queue-strip{padding:1rem 2rem;border-top:1px solid var(--border);display:flex;gap:.5rem;overflow-x:auto}
.queue-strip::-webkit-scrollbar{display:none}
.q-item{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.4rem .75rem;font-size:11px;color:var(--muted);white-space:nowrap;transition:all .2s}
.q-item.done{opacity:.3;text-decoration:line-through}
.q-item.current{background:var(--lime);border-color:var(--lime);color:#111;font-weight:600}

/* COMPLETE SCREEN */
.complete-view{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:2rem;padding:3rem;text-align:center}
.complete-view.active{display:flex}
.complete-icon{font-family:var(--display);font-size:5rem;color:var(--lime)}
.complete-title{font-family:var(--display);font-size:3.5rem;letter-spacing:.05em}
.complete-stats{display:flex;gap:3rem;margin:1rem 0}
.cs{text-align:center}
.cs-val{font-family:var(--display);font-size:2.5rem;color:var(--lime)}
.cs-lbl{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:.2rem}

/* MOBILE NAV TABS */
.mobile-tabs{display:none}

@media(max-width:700px){
  header{padding:0 1rem;height:50px}
  .logo{font-size:1.5rem}
  .header-tag{display:none}

  /* stack layout vertically, leave room for bottom tabs */
  .app{grid-template-rows:auto 1fr auto;height:100dvh;overflow:hidden}
  main{
    display:block;
    height:100%;
    overflow:hidden;
    position:relative;
  }

  /* sidebar becomes a full panel, hidden by default */
  .sidebar{
    position:absolute;inset:0;
    z-index:10;
    display:none;
    max-height:none;
    height:100%;
  }
  .sidebar.tab-active{display:flex}

  /* main panel also full panel */
  .main-panel{
    position:absolute;inset:0;
    display:none;
    height:100%;
  }
  .main-panel.tab-active{display:flex}

  /* builder adjustments */
  .builder-top{
    flex-direction:column;
    align-items:flex-start;
    padding:1rem;
    gap:.75rem;
  }
  .stats-row{
    align-self:stretch;
    justify-content:space-between;
    gap:.5rem;
  }
  .stat-val{font-size:1.3rem}
  .workout-name{font-size:1.4rem}

  .routine-list{padding:.75rem 1rem}

  .builder-bottom{
    padding:.75rem 1rem;
    flex-wrap:wrap;
    gap:.5rem;
  }
  .builder-bottom > div[style]{
    margin-left:0 !important;
    width:100%;
    justify-content:flex-start;
  }
  .start-btn{flex:1}
  .clear-btn{flex:0 0 auto}

  /* timer adjustments */
  .timer-header{padding:.75rem 1rem;gap:.5rem}
  .timer-workout-name{font-size:1rem}
  .progress-text{font-size:11px;white-space:nowrap}
  .back-btn{padding:.4rem .75rem;font-size:12px}

  .timer-body{gap:1.25rem;padding:1rem .75rem}
  .ex-current-name{font-size:2rem}
  .timer-ring-wrap{width:160px;height:160px}
  .timer-ring-wrap svg{width:160px;height:160px}
  .timer-seconds{font-size:3rem}

  .t-btn{padding:.55rem 1rem;font-size:12px}
  .queue-strip{padding:.75rem 1rem}

  /* complete screen */
  .complete-view{padding:2rem 1.25rem;gap:1.5rem}
  .complete-title{font-size:2.5rem}
  .complete-stats{gap:1.5rem}
  .cs-val{font-size:2rem}

  /* BOTTOM TABS */
  .mobile-tabs{
    display:flex;
    background:var(--surface);
    border-top:1px solid var(--border);
    height:56px;
  }
  .mob-tab{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
    background:transparent;
    border:none;
    color:var(--muted);
    font-size:10px;
    letter-spacing:.06em;
    text-transform:uppercase;
    cursor:pointer;
    font-family:var(--sans);
    transition:color .15s;
    padding:0;
  }
  .mob-tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .mob-tab.active{color:var(--lime)}

  /* filter row scrollable */
  .filter-row{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:.6rem 1rem}
  .filter-row::-webkit-scrollbar{display:none}
  .filter-btn{flex-shrink:0}

  /* exercise cards */
  .exercise-card{padding:.7rem .85rem}
  .sidebar-header{padding:1rem 1rem .85rem}
}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">Pulse</div>
  <div class="header-right">
    <span class="header-tag">Workout Builder</span>
  </div>
</header>

<main>
  <!-- SIDEBAR: Exercise Library -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Exercise Library</div>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="6.5" cy="6.5" r="5" stroke="white" stroke-width="1.5"/>
          <path d="M10.5 10.5L14 14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search exercises..."/>
      </div>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div class="exercise-list" id="exerciseList"></div>
  </aside>

  <!-- MAIN PANEL -->
  <div class="main-panel">

    <!-- BUILDER -->
    <div class="builder-view" id="builderView">
      <div class="builder-top">
        <div class="workout-name-wrap">
          <div class="workout-name-label">Workout name</div>
          <input class="workout-name" id="workoutName" placeholder="My Workout" maxlength="32"/>
        </div>
        <div class="stats-row">
          <div class="stat">
            <div class="stat-val" id="statExercises">0</div>
            <div class="stat-lbl">Exercises</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="statSets">0</div>
            <div class="stat-lbl">Sets</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="statKcal">0</div>
            <div class="stat-lbl">Est. kcal</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="statTime">0</div>
            <div class="stat-lbl">Min</div>
          </div>
        </div>
      </div>

      <div class="routine-list" id="routineList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </div>
          <div style="font-size:14px;color:var(--muted)">Your routine is empty</div>
          <div style="font-size:12px;color:#555">Pick exercises from the library</div>
        </div>
      </div>

      <div class="builder-bottom">
        <button class="start-btn" id="startBtn" disabled>Start Workout</button>
        <button class="clear-btn" id="clearBtn">Clear All</button>
        <div style="display:flex;align-items:center;gap:.5rem;margin-left:auto">
          <span style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)">Rest</span>
          <button class="counter-btn" id="restMinus">−</button>
          <span id="restDisplay" style="font-size:13px;font-weight:600;min-width:42px;text-align:center;color:var(--text)">30s</span>
          <button class="counter-btn" id="restPlus">+</button>
        </div>
      </div>
    </div>

    <!-- TIMER VIEW -->
    <div class="timer-view" id="timerView">
      <div class="timer-header">
        <button class="back-btn" id="backBtn">← Back</button>
        <div class="timer-workout-name" id="timerWorkoutName">My Workout</div>
        <div class="progress-text" id="progressText">Exercise 1 of 1</div>
      </div>

      <div class="timer-body">
        <div class="current-exercise">
          <div class="ex-phase" id="exPhase">Get Ready</div>
          <div class="ex-current-name" id="exCurrentName">—</div>
          <div class="ex-set-info" id="exSetInfo">Set 1 of 3 · 10 reps</div>
        </div>

        <div class="timer-ring-wrap">
          <svg width="200" height="200" viewBox="0 0 200 200">
            <circle class="ring-bg" cx="100" cy="100" r="90"/>
            <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="90"/>
          </svg>
          <div class="timer-center">
            <div class="timer-seconds" id="timerSeconds">30</div>
            <div class="timer-phase-lbl" id="timerPhaseLabel">seconds</div>
          </div>
        </div>

        <div class="timer-controls">
          <button class="t-btn" id="prevBtn">← Prev</button>
          <button class="t-btn primary" id="pauseBtn">Pause</button>
          <button class="t-btn" id="nextBtn">Next →</button>
        </div>
      </div>

      <div class="queue-strip" id="queueStrip"></div>
    </div>

    <!-- COMPLETE VIEW -->
    <div class="complete-view" id="completeView">
      <div class="complete-icon">✓</div>
      <div class="complete-title">Workout Complete</div>
      <div class="complete-stats">
        <div class="cs"><div class="cs-val" id="cSets">0</div><div class="cs-lbl">Sets done</div></div>
        <div class="cs"><div class="cs-val" id="cKcal">0</div><div class="cs-lbl">Kcal burned</div></div>
        <div class="cs"><div class="cs-val" id="cTime">0</div><div class="cs-lbl">Minutes</div></div>
      </div>
      <button class="start-btn" id="newWorkoutBtn" style="margin-top:1rem">New Workout</button>
    </div>

  </div>
</main>

<!-- MOBILE BOTTOM TABS -->
<nav class="mobile-tabs" id="mobileTabs">
  <button class="mob-tab" id="tabLibrary" data-tab="library">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Library
  </button>
  <button class="mob-tab active" id="tabBuilder" data-tab="builder">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    Workout
  </button>
</nav>
</div>

<script>
const CAT_META = {
  all:          {label:"All",         bg:"#222",      color:"#aaa"},
  chest:        {label:"Chest",       bg:"#2a1018",   color:"#f06080"},
  shoulders:    {label:"Shoulders",   bg:"#101828",   color:"#6090f0"},
  triceps:      {label:"Triceps",     bg:"#1a1028",   color:"#9070e0"},
  biceps:       {label:"Biceps",      bg:"#1a1808",   color:"#d0a030"},
  back:         {label:"Back",        bg:"#0a1e1a",   color:"#40c090"},
  lats:         {label:"Lats",        bg:"#0a1820",   color:"#30b0d0"},
  traps:        {label:"Traps",       bg:"#1e1208",   color:"#d07820"},
  quads:        {label:"Quads",       bg:"#1a1200",   color:"#e09020"},
  hamstrings:   {label:"Hamstrings",  bg:"#0e1a0a",   color:"#70c040"},
  glutes:       {label:"Glutes",      bg:"#200e18",   color:"#d060a0"},
  "inner-legs": {label:"Inner Legs",  bg:"#1e0e20",   color:"#b060d0"},
  "outer-legs": {label:"Outer Legs",  bg:"#1e1008",   color:"#d07830"},
  calves:       {label:"Calves",      bg:"#101414",   color:"#50c0b0"},
  core:         {label:"Core",        bg:"#18082a",   color:"#a060e0"},

let routine = [];
let activeFilter = "all";
let searchQuery = "";
let timerState = {
  active: false, paused: false,
  queueIdx: 0, setIdx: 0,
  phase: "work",
  remaining: 30,
  restTime: 30,
  interval: null,
  startTime: null,
  totalSecs: 0,
};

function catStyle(cat){
  const m = CAT_META[cat]||{bg:"#222",color:"#aaa"};
  return`background:${m.bg};color:${m.color}`;
}
function catLabel(cat){
  return (CAT_META[cat]||{label:cat}).label;
}

function buildFilters(){
  const row = document.getElementById("filterRow");
  row.innerHTML = Object.keys(CAT_META).map(k=>`
    <button class="filter-btn${k==="all"?" active":""}" data-cat="${k}"
      style="${k==="all"?"":""}">
      ${CAT_META[k].label}
    </button>
  `).join("");
  row.querySelectorAll(".filter-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      activeFilter = btn.dataset.cat;
      renderLibrary();
    });
  });
}

function renderLibrary(){
  const list = document.getElementById("exerciseList");
  const q = searchQuery.toLowerCase();
  const filtered = EXERCISES.filter(e=>{
    const matchCat = activeFilter==="all"||e.cat===activeFilter;
    const matchQ = e.name.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  list.innerHTML = filtered.map(e=>`
    <div class="exercise-card" data-id="${e.id}">
      <div class="ex-info">
        <div class="ex-name">${e.name}</div>
        <div class="ex-meta">
          <span class="ex-cat cat-pill" style="${catStyle(e.cat)}">${catLabel(e.cat)}</span>
          <span>${e.reps ? e.reps+" reps" : (e.duration||"")}</span>
        </div>
      </div>
      <button class="add-btn" data-id="${e.id}" title="Add to routine">+</button>
    </div>
  `).join("");
  list.querySelectorAll(".add-btn").forEach(btn=>{
    btn.addEventListener("click",ev=>{ev.stopPropagation();window.addExercise(parseInt(btn.dataset.id))});
  });
  list.querySelectorAll(".exercise-card").forEach(card=>{
    card.addEventListener("click",()=>window.addExercise(parseInt(card.dataset.id)));
  });
}

function addExercise(id){
  const ex = EXERCISES.find(e=>e.id===id);
  if(!ex) return;
  routine.push({...ex, _uid: String(Date.now()+Math.random()), sets: ex.sets||3, reps: ex.reps||12});
  renderRoutine();
}

function removeExercise(uid){
  routine = routine.filter(e=>e._uid!==uid);
  renderRoutine();
}

function changeVal(uid, field, delta){
  const item = routine.find(e=>e._uid===uid);
  if(!item) return;
  if(field==="sets") item.sets = Math.max(1, Math.min(10, item.sets+delta));
  if(field==="reps") item.reps = Math.max(1, Math.min(30, (item.reps||10)+delta));
  renderRoutine();
}

function renderRoutine(){
  const list = document.getElementById("routineList");
  const startBtn = document.getElementById("startBtn");

  const EMPTY_HTML=`<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><div style="font-size:14px;color:var(--muted)">Your routine is empty</div><div style="font-size:12px;color:#555">Pick exercises from the library</div></div>`;
  if(routine.length===0){
    list.innerHTML=EMPTY_HTML;
    startBtn.disabled=true;
  } else {
    const items = routine.map(ex=>`
      <div class="routine-item" data-uid="${ex._uid}">
        <div class="ri-left">
          <div class="ri-name">${ex.name}</div>
          <div class="ri-controls">
            <div class="counter">
              <span class="counter-lbl">Sets</span>
              <button class="counter-btn" data-uid="${ex._uid}" data-field="sets" data-delta="-1">−</button>
              <span class="counter-val">${ex.sets}</span>
              <button class="counter-btn" data-uid="${ex._uid}" data-field="sets" data-delta="1">+</button>
            </div>
            ${ex.reps ? `<div class="counter">
              <span class="counter-lbl">Reps</span>
              <button class="counter-btn" data-uid="${ex._uid}" data-field="reps" data-delta="-1">−</button>
              <span class="counter-val">${ex.reps}</span>
              <button class="counter-btn" data-uid="${ex._uid}" data-field="reps" data-delta="1">+</button>
            </div>` : `<span style="font-size:12px;color:var(--muted)">${ex.duration||""}</span>`}
          </div>
        </div>
        <div class="ri-right">
          <span class="kcal-badge">~${Math.round(ex.kcalPerSet*ex.sets)} kcal</span>
          <button class="remove-btn" data-uid="${ex._uid}" title="Remove">×</button>
        </div>
      </div>
    `).join("");
    list.innerHTML=items;
    startBtn.disabled=false;

    list.querySelectorAll(".remove-btn").forEach(b=>{
      b.addEventListener("click",()=>removeExercise(b.dataset.uid));
    });
    list.querySelectorAll(".counter-btn").forEach(b=>{
      b.addEventListener("click",()=>changeVal(b.dataset.uid, b.dataset.field, parseInt(b.dataset.delta)));
    });
  }
  updateStats();
}

function updateStats(){
  const exCount = routine.length;
  const totalSets = routine.reduce((s,e)=>s+e.sets,0);
  const totalKcal = routine.reduce((s,e)=>s+Math.round(e.kcalPerSet*e.sets),0);
  const estMin = Math.round(totalSets * 2.5);
  document.getElementById("statExercises").textContent = exCount;
  document.getElementById("statSets").textContent = totalSets;
  document.getElementById("statKcal").textContent = totalKcal;
  document.getElementById("statTime").textContent = estMin;
}

function buildQueue(){
  const q = [];
  routine.forEach(ex=>{
    for(let s=1;s<=ex.sets;s++){
      q.push({name: ex.name, set: s, totalSets: ex.sets, reps: ex.reps, duration: ex.duration, kcal: ex.kcalPerSet, exObj: ex});
    }
  });
  return q;
}

function startWorkout(){
  const queue = buildQueue();
  if(!queue.length) return;
  timerState.queue = queue;
  timerState.queueIdx = 0;
  timerState.phase = "work";
  timerState.paused = false;
  timerState.startTime = Date.now();
  timerState.totalSecs = 0;

  document.getElementById("builderView").classList.add("hidden");
  document.getElementById("timerView").classList.add("active");
  document.getElementById("timerWorkoutName").textContent = document.getElementById("workoutName").value || "My Workout";
  renderQueueStrip();
  loadCurrentStep();
  runTimer();
}

function loadCurrentStep(){
  const q = timerState.queue;
  const idx = timerState.queueIdx;
  if(idx >= q.length){ finishWorkout(); return; }
  const step = q[idx];
  const isRest = timerState.phase === "rest";
  const duration = isRest ? timerState.restTime : 30;

  document.getElementById("exPhase").textContent = isRest ? "Rest" : "Work";
  document.getElementById("exCurrentName").textContent = step.name;
  document.getElementById("exSetInfo").textContent = `Set ${step.set} of ${step.totalSets}  ·  ${step.reps ? step.reps+" reps" : (step.duration||"")}`;
  document.getElementById("timerSeconds").textContent = duration;
  document.getElementById("timerPhaseLabel").textContent = isRest ? "rest" : "seconds";
  document.getElementById("progressText").textContent = `Exercise ${getExerciseIdx(idx)+1} of ${routine.length}`;
  timerState.remaining = duration;

  const ring = document.getElementById("ringProgress");
  ring.classList.toggle("rest", isRest);
  ring.style.strokeDashoffset = "0";
  renderQueueStrip();
}

function getExerciseIdx(qIdx){
  let count = 0, ex = -1;
  const q = timerState.queue;
  for(let i=0;i<=qIdx&&i<q.length;i++){
    if(i===0||(q[i].name!==q[i-1].name)){count++;ex=count-1;}
  }
  return ex;
}

function runTimer(){
  clearInterval(timerState.interval);
  const total = timerState.remaining;
  const CIRCUM = 565;
  let elapsed = 0;
  timerState.interval = setInterval(()=>{
    if(timerState.paused) return;
    elapsed++;
    timerState.remaining--;
    timerState.totalSecs++;
    document.getElementById("timerSeconds").textContent = timerState.remaining;
    const pct = elapsed / total;
    document.getElementById("ringProgress").style.strokeDashoffset = Math.round(CIRCUM * pct);
    if(timerState.remaining <= 0){
      clearInterval(timerState.interval);
      advanceStep();
    }
  }, 1000);
}

function advanceStep(){
  if(timerState.phase === "work"){
    timerState.phase = "rest";
    loadCurrentStep();
    runTimer();
  } else {
    timerState.phase = "work";
    timerState.queueIdx++;
    if(timerState.queueIdx >= timerState.queue.length){ finishWorkout(); return; }
    loadCurrentStep();
    runTimer();
  }
}

function finishWorkout(){
  clearInterval(timerState.interval);
  document.getElementById("timerView").classList.remove("active");
  const cv = document.getElementById("completeView");
  cv.classList.add("active");
  const totalKcal = routine.reduce((s,e)=>s+Math.round(e.kcalPerSet*e.sets),0);
  const totalSets = routine.reduce((s,e)=>s+e.sets,0);
  const mins = Math.round(timerState.totalSecs / 60);
  document.getElementById("cSets").textContent = totalSets;
  document.getElementById("cKcal").textContent = totalKcal;
  document.getElementById("cTime").textContent = Math.max(1, mins);
}

function renderQueueStrip(){
  const strip = document.getElementById("queueStrip");
  strip.innerHTML = timerState.queue.map((step,i)=>`
    <div class="q-item ${i < timerState.queueIdx ? "done" : i===timerState.queueIdx ? "current" : ""}">
      ${step.name} S${step.set}
    </div>
  `).join("");
  const cur = strip.querySelector(".current");
  if(cur) cur.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
}

document.getElementById("searchInput").addEventListener("input",e=>{
  searchQuery = e.target.value;
  renderLibrary();
});

document.getElementById("startBtn").addEventListener("click", startWorkout);

document.getElementById("clearBtn").addEventListener("click",()=>{
  routine=[];
  renderRoutine();
});

document.getElementById("backBtn").addEventListener("click",()=>{
  clearInterval(timerState.interval);
  document.getElementById("timerView").classList.remove("active");
  document.getElementById("builderView").classList.remove("hidden");
});

document.getElementById("pauseBtn").addEventListener("click",()=>{
  timerState.paused = !timerState.paused;
  document.getElementById("pauseBtn").textContent = timerState.paused ? "Resume" : "Pause";
});

document.getElementById("nextBtn").addEventListener("click",()=>{
  clearInterval(timerState.interval);
  advanceStep();
});

document.getElementById("prevBtn").addEventListener("click",()=>{
  clearInterval(timerState.interval);
  if(timerState.queueIdx > 0) timerState.queueIdx--;
  timerState.phase = "work";
  loadCurrentStep();
  runTimer();
});

document.getElementById("newWorkoutBtn").addEventListener("click",()=>{
  document.getElementById("completeView").classList.remove("active");
  document.getElementById("builderView").classList.remove("hidden");
  routine=[];
  renderRoutine();
});

const REST_STEPS = [10,15,20,30,45,60,90,120];
function updateRestDisplay(){
  document.getElementById("restDisplay").textContent = timerState.restTime >= 60
    ? (timerState.restTime/60).toFixed(0)+"m"
    : timerState.restTime+"s";
}
document.getElementById("restMinus").addEventListener("click",()=>{
  const i = REST_STEPS.indexOf(timerState.restTime);
  if(i > 0){ timerState.restTime = REST_STEPS[i-1]; updateRestDisplay(); }
});
document.getElementById("restPlus").addEventListener("click",()=>{
  const i = REST_STEPS.indexOf(timerState.restTime);
  if(i < REST_STEPS.length-1){ timerState.restTime = REST_STEPS[i+1]; updateRestDisplay(); }
});

// Mobile tab switching
function isMobile(){ return window.innerWidth <= 700; }
function setMobileTab(tab){
  const sidebar = document.querySelector('.sidebar');
  const mainPanel = document.querySelector('.main-panel');
  document.querySelectorAll('.mob-tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  if(!isMobile()) return;
  sidebar.classList.toggle('tab-active', tab==='library');
  mainPanel.classList.toggle('tab-active', tab==='builder');
}
function initLayout(){
  const sidebar = document.querySelector('.sidebar');
  const mainPanel = document.querySelector('.main-panel');
  if(isMobile()){
    sidebar.classList.remove('tab-active');
    mainPanel.classList.add('tab-active');
  } else {
    sidebar.classList.remove('tab-active');
    mainPanel.classList.remove('tab-active');
  }
}
document.querySelectorAll('.mob-tab').forEach(btn=>{
  btn.addEventListener('click',()=>setMobileTab(btn.dataset.tab));
});
// After adding exercise on mobile, auto-switch to builder
const _origAddExercise = addExercise;
window.addExercise = function(id){
  _origAddExercise(id);
  if(isMobile()) setMobileTab('builder');
};
window.addEventListener('resize', initLayout);
initLayout();

buildFilters();
renderLibrary();
renderRoutine();
</script>
